<div class="logo-wrap logo-reveal{% if hero %} logo-hero{% endif %}{% if extra_class %} {{ extra_class }}{% endif %}">
  {% if has_custom_logo() %}
  <img src="{{ logo_url() }}" alt="{{ get_setting('business_name', 'Glam Me Upp') }}" class="logo-img logo-custom"
       width="{{ width|default(150) }}" height="{{ height|default(38) }}" decoding="async"
       onerror="this.onerror=null;this.src='{{ static_url('img/logo.svg') }}?v=12';">
  {% else %}
  <img src="{{ static_url('img/logo.svg') }}?v=12" alt="{{ get_setting('business_name', 'Glam Me Upp') }}" class="logo-img logo-variant logo-light"
       data-logo-light="{{ static_url('img/logo.svg') }}?v=12"
       data-logo-dark="{{ static_url('img/logo-dark.svg') }}?v=12"
       width="{{ width|default(150) }}" height="{{ height|default(38) }}" decoding="async"
       onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
  <img src="{{ static_url('img/logo-dark.svg') }}?v=12" alt="" class="logo-img logo-variant logo-dark" aria-hidden="true"
       width="{{ width|default(150) }}" height="{{ height|default(38) }}" decoding="async" style="display:none">
  <div class="logo-fallback" style="display:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;letter-spacing:0.2em;color:var(--text)">GMU</div>
  {% endif %}
</div>
