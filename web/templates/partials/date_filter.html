<form class="date-range-form glass" method="get" action="{{ form_action }}">
  <p class="section-title" style="margin-top:0">Date range</p>
  <div class="date-range-row">
    <label class="date-range-field">
      <span>From</span>
      <input type="date" name="date_from" value="{{ date_from or '' }}">
    </label>
    <label class="date-range-field">
      <span>To</span>
      <input type="date" name="date_to" value="{{ date_to or '' }}">
    </label>
  </div>
  <button type="submit" class="btn btn-accent" style="width:100%;margin-top:0.75rem">Apply dates</button>
  {% if date_from and date_to %}
  <a href="{{ clear_url }}" class="btn" style="display:block;text-align:center;margin-top:0.5rem;font-size:0.8rem;color:var(--muted)">Clear custom range</a>
  {% endif %}
  {% if date_from and date_to %}
  <p class="date-range-label">Showing {{ date_from }} → {{ date_to }}</p>
  {% endif %}
</form>
