{% extends "base.html" %}
{% set active = 'clients' %}
{% block title %}New Client{% endblock %}
{% block header %}New Client{% endblock %}
{% block content %}
<form method="post" action="{{ url('/clients/new') }}" class="settings-form glass" style="padding:1rem">
  <label>Name *</label><input name="name" required>
  <label>Phone</label><input name="phone" type="tel">
  <label>Lead source</label><input name="lead_source" placeholder="referral, instagram…">
  <label>Notes</label><textarea name="notes" rows="3"></textarea>
  <button type="submit" class="btn btn-primary">Save client</button>
</form>
<a href="{{ url('/clients') }}" class="btn btn-accent" style="display:block;margin-top:0.5rem">Cancel</a>
{% endblock %}
